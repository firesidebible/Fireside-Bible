<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fireside Bible</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />

<style>
  /* ── Reset & Variables ───────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #f5f0e8;
    --parchment:    #ede6d6;
    --sidebar-bg:   #1c1a16;
    --sidebar-text: #c9bfa8;
    --sidebar-dim:  #7a6f5e;
    --ink:          #1e1b14;
    --ink-soft:     #4a4235;
    --accent:       #8b3a1e;
    --accent-gold:  #c09a3e;
    --rule:         #d4c9b0;
    --sidebar-w:    300px;
    --header-h:     56px;
    --font-body:    'EB Garamond', Georgia, serif;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-title:   'Cinzel', serif;
    --ease:         cubic-bezier(.4,0,.2,1);
  }

  html, body { height: 100%; height: 100dvh; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top Bar ─────────────────────────────────────────────────────── */
  #topbar {
    height: var(--header-h);
    background: var(--sidebar-bg);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    flex-shrink: 0;
    border-bottom: 1px solid #3a3528;
    z-index: 50;
  }

  #menu-toggle {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 4px;
  }
  #menu-toggle span {
    display: block;
    width: 22px;
    height: 1.5px;
    background: var(--sidebar-text);
    transition: transform .3s var(--ease), opacity .3s;
  }
  body.nav-open #menu-toggle span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
  body.nav-open #menu-toggle span:nth-child(2) { opacity: 0; }
  body.nav-open #menu-toggle span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

  #topbar-title {
    font-family: var(--font-title);
    font-size: 1rem;
    letter-spacing: .18em;
    color: var(--accent-gold);
    text-transform: uppercase;
    flex: 1;
  }

  #chapter-ref {
    font-family: var(--font-display);
    font-size: .85rem;
    color: var(--sidebar-dim);
    letter-spacing: .06em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 240px;
  }

  /* ── Layout ──────────────────────────────────────────────────────── */
  #layout {
    display: flex;
    flex: 1;
    min-height: 0;
    overflow: hidden;
    position: relative;
  }

  /* ── Sidebar ─────────────────────────────────────────────────────── */
  #sidebar {
    width: var(--sidebar-w);
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
    transform: translateX(0);
    transition: transform .35s var(--ease), width .35s var(--ease);
    border-right: 1px solid #3a3528;
  }

  body.nav-closed #sidebar {
    transform: translateX(calc(-1 * var(--sidebar-w)));
    width: 0;
  }

  #sidebar-inner {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    flex: 1;
    padding: 12px 0 24px;
    scrollbar-width: thin;
    scrollbar-color: #3a3528 transparent;
  }
  #sidebar-inner::-webkit-scrollbar { width: 4px; }
  #sidebar-inner::-webkit-scrollbar-thumb { background: #3a3528; border-radius: 2px; }

  /* Testament groups */
  .testament-group { margin-bottom: 4px; }

  .testament-label {
    font-family: var(--font-title);
    font-size: .6rem;
    letter-spacing: .22em;
    color: var(--accent-gold);
    text-transform: uppercase;
    padding: 14px 20px 6px;
    opacity: .8;
  }

  /* Book rows */
  .book-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 20px;
    cursor: pointer;
    color: var(--sidebar-text);
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: .03em;
    transition: background .15s, color .15s;
    user-select: none;
  }
  .book-row:hover { background: #2a271f; color: #e8dcc8; }
  .book-row.active { color: var(--accent-gold); }

  .book-chevron {
    font-size: .65rem;
    color: var(--sidebar-dim);
    transition: transform .25s var(--ease);
    flex-shrink: 0;
  }
  .book-row.open .book-chevron { transform: rotate(90deg); }

  /* Chapter list */
  .chapter-list {
    display: none;
    flex-wrap: wrap;
    gap: 4px;
    padding: 6px 20px 10px 28px;
  }
  .chapter-list.open { display: flex; }

  .ch-btn {
    background: none;
    border: 1px solid #3a3528;
    color: var(--sidebar-dim);
    font-family: var(--font-display);
    font-size: .78rem;
    width: 32px;
    height: 28px;
    cursor: pointer;
    border-radius: 2px;
    transition: background .15s, color .15s, border-color .15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ch-btn:hover { background: #2a271f; color: var(--sidebar-text); border-color: #5a5040; }
  .ch-btn.active { background: var(--accent); color: #f0e6d0; border-color: var(--accent); }

  /* ── Reader ──────────────────────────────────────────────────────── */
  #reader {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
    scrollbar-width: thin;
    scrollbar-color: var(--rule) transparent;
  }
  #reader::-webkit-scrollbar { width: 5px; }
  #reader::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }

  #content-wrap {
    max-width: 680px;
    margin: 0 auto;
    padding: 56px 40px 80px;
    width: 100%;
    animation: fadeIn .4s var(--ease);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #chapter-heading {
    font-family: var(--font-title);
    font-size: 1rem;
    letter-spacing: .2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: .85;
  }

  #chapter-title {
    font-family: var(--font-display);
    font-size: 2.4rem;
    font-weight: 300;
    line-height: 1.15;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .ornament {
    display: block;
    text-align: center;
    color: var(--accent-gold);
    font-size: 1.1rem;
    letter-spacing: .6em;
    margin: 24px 0;
    opacity: .6;
  }

  #chapter-body {
    font-size: 1.15rem;
    line-height: 1.85;
    color: var(--ink-soft);
  }

  #chapter-body p {
    margin-bottom: 1.4em;
    text-align: justify;
    hyphens: auto;
  }

  #chapter-body p:first-child::first-letter {
    font-family: var(--font-title);
    font-size: 3.6em;
    line-height: .75;
    float: left;
    margin: .05em .12em 0 0;
    color: var(--accent);
  }

  /* Verse numbers (if you embed them) */
  .v-num {
    font-family: var(--font-title);
    font-size: .55em;
    vertical-align: super;
    color: var(--accent-gold);
    margin-right: 2px;
    opacity: .75;
  }

  /* ── Nav Buttons ─────────────────────────────────────────────────── */
  #nav-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-top: 1px solid var(--rule);
    background: var(--bg);
    flex-shrink: 0;
  }

  .nav-btn {
    background: none;
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    font-family: var(--font-display);
    font-size: .95rem;
    padding: 9px 22px;
    cursor: pointer;
    border-radius: 2px;
    letter-spacing: .04em;
    transition: background .2s, color .2s, border-color .2s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .nav-btn:hover { background: var(--parchment); border-color: var(--accent-gold); color: var(--ink); }
  .nav-btn:disabled { opacity: .25; cursor: default; }
  .nav-btn:disabled:hover { background: none; border-color: var(--rule); color: var(--ink-soft); }

  .nav-btn .arrow { font-size: 1.1em; }

  #nav-center {
    font-family: var(--font-display);
    font-size: .9rem;
    color: var(--sidebar-dim);
    text-align: center;
    line-height: 1.4;
  }
  #nav-center strong { display: block; color: var(--ink); font-weight: 500; }

  /* ── Splash / Loading ─────────────────────────────────────────────── */
  #splash {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 40px;
    text-align: center;
    color: var(--ink-soft);
  }
  #splash h2 {
    font-family: var(--font-title);
    font-size: 1.5rem;
    letter-spacing: .15em;
    color: var(--ink);
    font-weight: 400;
  }
  #splash p { font-family: var(--font-display); font-size: 1.1rem; opacity: .7; }

  /* ── Mobile ──────────────────────────────────────────────────────── */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 30;
  }

  @media (max-width: 700px) {
    :root { --sidebar-w: 280px; }

    #sidebar {
      position: fixed;
      top: var(--header-h);
      left: 0;
      bottom: 0;
      z-index: 40;
      transform: translateX(0);
      width: var(--sidebar-w) !important;
    }
    body.nav-closed #sidebar { transform: translateX(calc(-1 * var(--sidebar-w))); }

    body.nav-open #overlay { display: block; }

    #content-wrap { padding: 36px 22px 60px; }
    #nav-bar { padding: 16px 18px; }
    #chapter-title { font-size: 1.8rem; }
    #chapter-body { font-size: 1.05rem; }
    #chapter-ref { display: none; }
  }
</style>
</head>
<body class="nav-open">

<!-- Top bar -->
<header id="topbar">
  <button id="menu-toggle" aria-label="Toggle navigation">
    <span></span><span></span><span></span>
  </button>
  <div id="topbar-title">Fireside Bible</div>
  <div id="chapter-ref">Select a chapter</div>
</header>

<!-- Overlay for mobile -->
<div id="overlay"></div>

<!-- Main layout -->
<div id="layout">

  <!-- Sidebar -->
  <nav id="sidebar" aria-label="Bible navigation">
    <div id="sidebar-inner"></div>
  </nav>

  <!-- Reader column -->
  <div id="reader">
    <div id="content-wrap">
      <div id="splash">
        <h2>The Fireside Bible</h2>
        <p>Choose a book and chapter from the navigation panel.</p>
      </div>
      <div id="chapter-view" style="display:none">
        <div id="chapter-heading"></div>
        <h1 id="chapter-title"></h1>
        <span class="ornament">✦ ✦ ✦</span>
        <div id="chapter-body"></div>
      </div>
    </div>
  </div>

</div>

<!-- Prev / Next bar -->
<footer id="nav-bar">
  <button class="nav-btn" id="btn-prev" disabled>
    <span class="arrow">←</span> Previous
  </button>
  <div id="nav-center">
    <span id="nav-label">—</span>
  </div>
  <button class="nav-btn" id="btn-next" disabled>
    Next <span class="arrow">→</span>
  </button>
</footer>

<script>
/* ═══════════════════════════════════════════════════════════════════
   CONFIG — point DATA_URL at your JSON file
   ═══════════════════════════════════════════════════════════════════ */
const DATA_URL = './fsb-content.json';

/* ═══════════════════════════════════════════════════════════════════
   EXPECTED JSON SHAPE
   ─────────────────────────────────────────────────────────────────
   {
     "testaments": [
       {
         "name": "Old Testament",
         "books": [
           {
             "name": "Genesis",
             "chapters": [
               {
                 "number": 1,
                 "title": "In the Beginning",   ← optional subtitle
                 "paragraphs": [
                   "In the beginning, God...",
                   "The earth was without form..."
                 ]
               }
             ]
           }
         ]
       }
     ]
   }
   ═══════════════════════════════════════════════════════════════════ */

/* ── State ─────────────────────────────────────────────────────────── */
let bible = null;           // full JSON data
let flatIndex = [];         // [{testamentIdx, bookIdx, chapterIdx, label}]
let currentFlat = -1;       // position in flatIndex

/* ── DOM refs ───────────────────────────────────────────────────────── */
const sidebarInner  = document.getElementById('sidebar-inner');
const splash        = document.getElementById('splash');
const chapterView   = document.getElementById('chapter-view');
const chapterHeading = document.getElementById('chapter-heading');
const chapterTitle  = document.getElementById('chapter-title');
const chapterBody   = document.getElementById('chapter-body');
const chapterRef    = document.getElementById('chapter-ref');
const navLabel      = document.getElementById('nav-label');
const btnPrev       = document.getElementById('btn-prev');
const btnNext       = document.getElementById('btn-next');
const menuToggle    = document.getElementById('menu-toggle');
const overlay       = document.getElementById('overlay');
const reader        = document.getElementById('reader');

/* ── Load data ──────────────────────────────────────────────────────── */
async function init() {
  try {
    const res = await fetch(DATA_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    bible = await res.json();
    buildIndex();
    buildSidebar();
  } catch (e) {
    showError(e);
  }
}

function buildIndex() {
  flatIndex = [];
  bible.testaments.forEach((t, ti) => {
    t.books.forEach((b, bi) => {
      b.chapters.forEach((c, ci) => {
        flatIndex.push({
          testamentIdx: ti,
          bookIdx: bi,
          chapterIdx: ci,
          label: `${b.name} ${c.number}`
        });
      });
    });
  });
}

/* ── Build Sidebar ──────────────────────────────────────────────────── */
function buildSidebar() {
  sidebarInner.innerHTML = '';

  bible.testaments.forEach((testament, ti) => {
    const group = document.createElement('div');
    group.className = 'testament-group';

    const label = document.createElement('div');
    label.className = 'testament-label';
    label.textContent = testament.name;
    group.appendChild(label);

    testament.books.forEach((book, bi) => {
      const bookRow = document.createElement('div');
      bookRow.className = 'book-row';
      bookRow.dataset.ti = ti;
      bookRow.dataset.bi = bi;
      bookRow.innerHTML = `
        <span>${book.name}</span>
        <span class="book-chevron">▶</span>
      `;

      const chList = document.createElement('div');
      chList.className = 'chapter-list';
      chList.id = `cl-${ti}-${bi}`;

      book.chapters.forEach((ch, ci) => {
        const btn = document.createElement('button');
        btn.className = 'ch-btn';
        btn.textContent = ch.number;
        btn.dataset.ti = ti;
        btn.dataset.bi = bi;
        btn.dataset.ci = ci;
        btn.setAttribute('aria-label', `${book.name} chapter ${ch.number}`);
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          navigateTo(ti, bi, ci);
          // Auto-close on mobile
          if (window.innerWidth <= 700) toggleNav(false);
        });
        chList.appendChild(btn);
      });

      bookRow.addEventListener('click', () => {
        const isOpen = chList.classList.contains('open');
        // Close all others
        document.querySelectorAll('.chapter-list.open').forEach(el => {
          if (el !== chList) {
            el.classList.remove('open');
            el.previousElementSibling?.classList.remove('open');
          }
        });
        chList.classList.toggle('open', !isOpen);
        bookRow.classList.toggle('open', !isOpen);
        if (!isOpen) {
          // Scroll book into view
          setTimeout(() => bookRow.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
        }
      });

      group.appendChild(bookRow);
      group.appendChild(chList);
    });

    sidebarInner.appendChild(group);
  });
}

/* ── Navigate ───────────────────────────────────────────────────────── */
function navigateTo(ti, bi, ci) {
  const testament = bible.testaments[ti];
  const book      = testament.books[bi];
  const chapter   = book.chapters[ci];

  // Find flat index position
  currentFlat = flatIndex.findIndex(
    x => x.testamentIdx === ti && x.bookIdx === bi && x.chapterIdx === ci
  );

  renderChapter(testament, book, chapter);
  updateSidebarActive(ti, bi, ci);
  updateNavButtons();

  // Scroll reader to top
  reader.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderChapter(testament, book, chapter) {
  // Show view, hide splash
  splash.style.display = 'none';
  chapterView.style.display = 'block';

  // Trigger re-animation
  const wrap = document.getElementById('content-wrap');
  wrap.style.animation = 'none';
  wrap.offsetHeight; // reflow
  wrap.style.animation = '';

  const bookChLabel = `${book.name} ${chapter.number}`;

  chapterHeading.textContent = `${testament.name}  ·  ${book.name}`;
  chapterTitle.textContent   = chapter.title
    ? `${chapter.number}. ${chapter.title}`
    : `Chapter ${chapter.number}`;

  // Build body paragraphs
  chapterBody.innerHTML = (chapter.paragraphs || [])
    .map(p => `<p>${p}</p>`)
    .join('');

  chapterRef.textContent = bookChLabel;
  navLabel.innerHTML = `<strong>${bookChLabel}</strong>`;
}

function updateSidebarActive(ti, bi, ci) {
  // Clear old active states
  document.querySelectorAll('.book-row.active').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.ch-btn.active').forEach(el => el.classList.remove('active'));

  // Set new active
  const bookRows = document.querySelectorAll(`.book-row[data-ti="${ti}"][data-bi="${bi}"]`);
  bookRows.forEach(r => r.classList.add('active'));

  const chBtn = document.querySelector(`.ch-btn[data-ti="${ti}"][data-bi="${bi}"][data-ci="${ci}"]`);
  if (chBtn) {
    chBtn.classList.add('active');
    // Ensure book is open
    const chList = document.getElementById(`cl-${ti}-${bi}`);
    if (chList && !chList.classList.contains('open')) {
      chList.classList.add('open');
      const bookRow = chList.previousElementSibling;
      if (bookRow) bookRow.classList.add('open');
    }
  }
}

function updateNavButtons() {
  btnPrev.disabled = currentFlat <= 0;
  btnNext.disabled = currentFlat >= flatIndex.length - 1;
}

/* ── Prev / Next ────────────────────────────────────────────────────── */
btnPrev.addEventListener('click', () => {
  if (currentFlat > 0) {
    const { testamentIdx, bookIdx, chapterIdx } = flatIndex[currentFlat - 1];
    navigateTo(testamentIdx, bookIdx, chapterIdx);
  }
});

btnNext.addEventListener('click', () => {
  if (currentFlat < flatIndex.length - 1) {
    const { testamentIdx, bookIdx, chapterIdx } = flatIndex[currentFlat + 1];
    navigateTo(testamentIdx, bookIdx, chapterIdx);
  }
});

/* ── Keyboard nav ───────────────────────────────────────────────────── */
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' && !btnNext.disabled) btnNext.click();
  if (e.key === 'ArrowLeft'  && !btnPrev.disabled) btnPrev.click();
});

/* ── Sidebar toggle ─────────────────────────────────────────────────── */
function toggleNav(force) {
  const isOpen = !document.body.classList.contains('nav-closed');
  const shouldOpen = force !== undefined ? force : !isOpen;
  document.body.classList.toggle('nav-closed', !shouldOpen);
}

menuToggle.addEventListener('click', () => toggleNav());
overlay.addEventListener('click', () => toggleNav(false));

/* ── Error display ──────────────────────────────────────────────────── */
function showError(err) {
  splash.innerHTML = `
    <h2>Could not load content</h2>
    <p>Make sure <code>fsb-content.json</code> is in the same directory as this file.</p>
    <p style="font-size:.85rem;opacity:.5;margin-top:8px">${err.message}</p>
  `;
}

/* ── Start ──────────────────────────────────────────────────────────── */
init();
</script>
</body>
</html>
