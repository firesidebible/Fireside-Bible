<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fireside Bible</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #f5f0e8;
    --parchment:    #ede6d6;
    --sidebar-bg:   #1c1a16;
    --sidebar-text: #c9bfa8;
    --sidebar-dim:  #7a6f5e;
    --ink:          #1e1b14;
    --ink-soft:     #4a4235;
    --accent:       #8b3a1e;
    --accent-gold:  #c09a3e;
    --rule:         #d4c9b0;
    --sidebar-w:    300px;
    --header-h:     56px;
    --footer-h:     68px;
    --font-body:    'EB Garamond', Georgia, serif;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-title:   'Cinzel', serif;
    --ease:         cubic-bezier(.4,0,.2,1);
  }

  /* ── Base ─────────────────────────────────────────────────────────── */
  html { height: 100%; }
  body {
    height: 100%;
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--ink);
    /* NO overflow:hidden on body — let fixed children handle their own bounds */
  }

  /* ── Top Bar (fixed) ─────────────────────────────────────────────── */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: var(--sidebar-bg);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    border-bottom: 1px solid #3a3528;
    z-index: 100;
  }

  #menu-toggle {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 8px 4px;
    /* Larger touch target */
    min-width: 40px;
    min-height: 40px;
    justify-content: center;
  }
  #menu-toggle span {
    display: block;
    width: 22px;
    height: 1.5px;
    background: var(--sidebar-text);
    transition: transform .3s var(--ease), opacity .3s;
  }
  body.nav-open #menu-toggle span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
  body.nav-open #menu-toggle span:nth-child(2) { opacity: 0; }
  body.nav-open #menu-toggle span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

  #topbar-title {
    font-family: var(--font-title);
    font-size: 1rem;
    letter-spacing: .18em;
    color: var(--accent-gold);
    text-transform: uppercase;
    flex: 1;
  }

  #chapter-ref {
    font-family: var(--font-display);
    font-size: .85rem;
    color: var(--sidebar-dim);
    letter-spacing: .06em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 200px;
  }

  #about-btn {
    background: none;
    border: 1px solid #3a3528;
    color: var(--sidebar-text);
    font-family: var(--font-title);
    font-size: .6rem;
    letter-spacing: .18em;
    text-transform: uppercase;
    padding: 6px 12px;
    cursor: pointer;
    border-radius: 2px;
    transition: background .2s, border-color .2s, color .2s;
    white-space: nowrap;
    min-height: 32px;
  }
  #about-btn:active { background: #2a271f; color: var(--accent-gold); border-color: var(--accent-gold); }

  /* ── About Modal ─────────────────────────────────────────────────── */
  #about-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #about-backdrop.open { display: flex; }

  #about-panel {
    background: var(--parchment);
    border-radius: 4px;
    width: 100%;
    max-width: 640px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 8px 40px rgba(0,0,0,.4);
    overflow: hidden;
  }

  #about-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 22px;
    border-bottom: 1px solid var(--rule);
    flex-shrink: 0;
  }
  #about-header h2 {
    font-family: var(--font-title);
    font-size: .85rem;
    letter-spacing: .18em;
    color: var(--ink);
    font-weight: 400;
    text-transform: uppercase;
  }
  #about-close {
    background: none;
    border: none;
    font-size: 1.4rem;
    color: var(--sidebar-dim);
    cursor: pointer;
    line-height: 1;
    padding: 4px 8px;
    min-width: 40px;
    min-height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #about-close:active { color: var(--ink); }

  #about-body {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 28px 28px 36px;
    flex: 1;
  }

  /* Markdown rendered styles */
  #about-body h1 {
    font-family: var(--font-title);
    font-size: 1.3rem;
    font-weight: 400;
    letter-spacing: .1em;
    color: var(--ink);
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--rule);
  }
  #about-body h2 {
    font-family: var(--font-title);
    font-size: .9rem;
    font-weight: 400;
    letter-spacing: .12em;
    color: var(--accent);
    text-transform: uppercase;
    margin: 24px 0 10px;
  }
  #about-body h3 {
    font-family: var(--font-display);
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--ink);
    margin: 18px 0 8px;
  }
  #about-body p {
    font-family: var(--font-body);
    font-size: 1rem;
    line-height: 1.75;
    color: var(--ink-soft);
    margin-bottom: 1em;
  }
  #about-body ul, #about-body ol {
    font-family: var(--font-body);
    font-size: 1rem;
    line-height: 1.75;
    color: var(--ink-soft);
    margin: 0 0 1em 1.4em;
  }
  #about-body li { margin-bottom: .3em; }
  #about-body strong { color: var(--ink); font-weight: 600; }
  #about-body em { font-style: italic; }
  #about-body code {
    font-family: monospace;
    font-size: .85em;
    background: var(--rule);
    padding: 1px 5px;
    border-radius: 2px;
  }
  #about-body hr {
    border: none;
    border-top: 1px solid var(--rule);
    margin: 20px 0;
  }
  #about-body blockquote {
    border-left: 3px solid var(--accent-gold);
    margin: 0 0 1em;
    padding: 4px 16px;
    color: var(--ink-soft);
    font-style: italic;
  }
  #about-loading {
    font-family: var(--font-display);
    font-size: 1rem;
    color: var(--sidebar-dim);
    text-align: center;
    padding: 40px;
  }

  /* ── Nav Bar (fixed) ─────────────────────────────────────────────── */
  #nav-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--footer-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    border-top: 1px solid var(--rule);
    background: var(--bg);
    z-index: 100;
  }

  .nav-btn {
    background: none;
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    font-family: var(--font-display);
    font-size: .95rem;
    padding: 9px 20px;
    cursor: pointer;
    border-radius: 2px;
    letter-spacing: .04em;
    transition: background .2s, color .2s, border-color .2s;
    display: flex;
    align-items: center;
    gap: 8px;
    /* Adequate touch target */
    min-height: 44px;
  }
  .nav-btn:active { background: var(--parchment); }
  .nav-btn:disabled { opacity: .25; cursor: default; }

  .nav-btn .arrow { font-size: 1.1em; }

  #nav-center {
    font-family: var(--font-display);
    font-size: .85rem;
    color: var(--sidebar-dim);
    text-align: center;
    line-height: 1.4;
  }
  #nav-center strong { display: block; color: var(--ink); font-weight: 500; }

  /* ── Sidebar (fixed, slides in/out) ─────────────────────────────── */
  #sidebar {
    position: fixed;
    top: var(--header-h);
    left: 0;
    bottom: 0;
    width: var(--sidebar-w);
    background: var(--sidebar-bg);
    border-right: 1px solid #3a3528;
    display: flex;
    flex-direction: column;
    z-index: 90;
    transform: translateX(0);
    transition: transform .35s var(--ease);
    /* Sidebar is always fixed/overlaying on all sizes for simplicity */
  }

  body.nav-closed #sidebar {
    transform: translateX(calc(-1 * var(--sidebar-w)));
  }

  #sidebar-inner {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    flex: 1;
    padding: 12px 0 24px;
    scrollbar-width: thin;
    scrollbar-color: #3a3528 transparent;
  }
  #sidebar-inner::-webkit-scrollbar { width: 4px; }
  #sidebar-inner::-webkit-scrollbar-thumb { background: #3a3528; border-radius: 2px; }

  /* ── Overlay (closes sidebar on tap) ────────────────────────────── */
  #overlay {
    display: none;
    position: fixed;
    top: var(--header-h);
    left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.45);
    z-index: 80;
    /* Overlay sits BELOW sidebar (z:90) but ABOVE reader (z:10) */
  }
  body.nav-open #overlay { display: block; }

  /* ── Reader (fixed, the only scrollable text area) ───────────────── */
  #reader {
    position: fixed;
    top: var(--header-h);
    left: 0;
    right: 0;
    bottom: var(--footer-h);
    overflow-y: scroll;
    -webkit-overflow-scrolling: touch;
    background: var(--bg);
    z-index: 10;
  }

  #content-wrap {
    max-width: 660px;
    margin: 0 auto;
    padding: 48px 36px 48px;
    width: 100%;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fadein { animation: fadeIn .35s var(--ease); }

  /* ── Sidebar Nav ─────────────────────────────────────────────────── */
  .testament-group { margin-bottom: 4px; }

  .testament-label {
    font-family: var(--font-title);
    font-size: .6rem;
    letter-spacing: .22em;
    color: var(--accent-gold);
    text-transform: uppercase;
    padding: 14px 20px 6px;
    opacity: .8;
  }

  .book-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 20px;
    cursor: pointer;
    color: var(--sidebar-text);
    font-family: var(--font-display);
    font-size: 1rem;
    letter-spacing: .03em;
    transition: background .15s, color .15s;
    user-select: none;
    min-height: 44px;
  }
  .book-row:active { background: #2a271f; }
  .book-row.active { color: var(--accent-gold); }

  .book-chevron {
    font-size: .65rem;
    color: var(--sidebar-dim);
    transition: transform .25s var(--ease);
    flex-shrink: 0;
    padding: 4px;
  }
  .book-row.open .book-chevron { transform: rotate(90deg); }

  .chapter-list {
    display: none;
    flex-wrap: wrap;
    gap: 4px;
    padding: 6px 20px 10px 28px;
  }
  .chapter-list.open { display: flex; }

  .ch-btn {
    background: none;
    border: 1px solid #3a3528;
    color: var(--sidebar-dim);
    font-family: var(--font-display);
    font-size: .78rem;
    width: 36px;
    height: 36px;
    cursor: pointer;
    border-radius: 2px;
    transition: background .15s, color .15s, border-color .15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ch-btn:active { background: #2a271f; color: var(--sidebar-text); }
  .ch-btn.active { background: var(--accent); color: #f0e6d0; border-color: var(--accent); }

  /* ── Typography ──────────────────────────────────────────────────── */
  #chapter-heading {
    font-family: var(--font-title);
    font-size: 1rem;
    letter-spacing: .2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: .85;
  }

  #chapter-title {
    font-family: var(--font-display);
    font-size: 2.4rem;
    font-weight: 300;
    line-height: 1.15;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .ornament {
    display: block;
    text-align: center;
    color: var(--accent-gold);
    font-size: 1.1rem;
    letter-spacing: .6em;
    margin: 24px 0;
    opacity: .6;
  }

  #chapter-body {
    font-size: 1.15rem;
    line-height: 1.85;
    color: var(--ink-soft);
  }

  #chapter-body p {
    margin-bottom: 1.4em;
    text-align: justify;
    hyphens: auto;
  }

  #chapter-body p:first-child::first-letter {
    font-family: var(--font-title);
    font-size: 3.6em;
    line-height: .75;
    float: left;
    margin: .05em .12em 0 0;
    color: var(--accent);
  }

  /* ── Splash ──────────────────────────────────────────────────────── */
  #splash {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 12px;
    padding: 40px;
    text-align: center;
    color: var(--ink-soft);
  }
  #splash h2 {
    font-family: var(--font-title);
    font-size: 1.5rem;
    letter-spacing: .15em;
    color: var(--ink);
    font-weight: 400;
  }
  #splash p { font-family: var(--font-display); font-size: 1.1rem; opacity: .7; }

  /* ── Desktop: sidebar pushes content rather than overlaying ──────── */
  @media (min-width: 860px) {
    #reader {
      left: var(--sidebar-w);
      transition: left .35s var(--ease);
    }
    body.nav-closed #reader { left: 0; }
    #overlay { display: none !important; }
    #nav-bar {
      left: var(--sidebar-w);
      transition: left .35s var(--ease);
    }
    body.nav-closed #nav-bar { left: 0; }
    #chapter-ref { display: block; }
  }

  /* ── Mobile tweaks ───────────────────────────────────────────────── */
  @media (max-width: 859px) {
    #content-wrap { padding: 32px 20px 40px; }
    #chapter-title { font-size: 1.9rem; }
    #chapter-body { font-size: 1.05rem; }
    #chapter-ref { display: none; }
  }
</style>
</head>
<body class="nav-closed">

<header id="topbar">
  <button id="menu-toggle" aria-label="Toggle navigation">
    <span></span><span></span><span></span>
  </button>
  <div id="topbar-title">Fireside Bible</div>
  <div id="chapter-ref"></div>
  <button id="about-btn" aria-label="About">About</button>
</header>

<div id="overlay"></div>

<div id="about-backdrop" role="dialog" aria-modal="true" aria-labelledby="about-title">
  <div id="about-panel">
    <div id="about-header">
      <h2 id="about-title">About</h2>
      <button id="about-close" aria-label="Close">✕</button>
    </div>
    <div id="about-body">
      <div id="about-loading">Loading…</div>
    </div>
  </div>
</div>

<nav id="sidebar" aria-label="Bible navigation">
  <div id="sidebar-inner"></div>
</nav>

<div id="reader">
  <div id="content-wrap">
    <div id="splash">
      <h2>The Fireside Bible</h2>
      <p>Choose a book and chapter from the navigation panel.</p>
    </div>
    <div id="chapter-view" style="display:none">
      <div id="chapter-heading"></div>
      <h1 id="chapter-title"></h1>
      <span class="ornament">✦ ✦ ✦</span>
      <div id="chapter-body"></div>
    </div>
  </div>
</div>

<footer id="nav-bar">
  <button class="nav-btn" id="btn-prev" disabled>
    <span class="arrow">←</span> Previous
  </button>
  <div id="nav-center">
    <span id="nav-label">—</span>
  </div>
  <button class="nav-btn" id="btn-next" disabled>
    Next <span class="arrow">→</span>
  </button>
</footer>

<script>
const DATA_URL = './fsb-content.json';

let bible = null;
let flatIndex = [];
let currentFlat = -1;

const sidebarInner   = document.getElementById('sidebar-inner');
const splash         = document.getElementById('splash');
const chapterView    = document.getElementById('chapter-view');
const chapterHeading = document.getElementById('chapter-heading');
const chapterTitle   = document.getElementById('chapter-title');
const chapterBody    = document.getElementById('chapter-body');
const chapterRef     = document.getElementById('chapter-ref');
const navLabel       = document.getElementById('nav-label');
const btnPrev        = document.getElementById('btn-prev');
const btnNext        = document.getElementById('btn-next');
const menuToggle     = document.getElementById('menu-toggle');
const overlay        = document.getElementById('overlay');
const reader         = document.getElementById('reader');

async function init() {
  try {
    const res = await fetch(DATA_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    bible = await res.json();
    buildIndex();
    buildSidebar();
  } catch (e) {
    splash.innerHTML = `
      <h2>Could not load content</h2>
      <p>Make sure <code>fsb-content.json</code> is in the same directory.</p>
      <p style="font-size:.8rem;opacity:.4;margin-top:8px">${e.message}</p>`;
  }
}

function buildIndex() {
  flatIndex = [];
  bible.testaments.forEach((t, ti) => {
    t.books.forEach((b, bi) => {
      b.chapters.forEach((c, ci) => {
        flatIndex.push({ ti, bi, ci, label: `${b.name} ${c.number}` });
      });
    });
  });
}

function buildSidebar() {
  sidebarInner.innerHTML = '';
  bible.testaments.forEach((testament, ti) => {
    const group = document.createElement('div');
    group.className = 'testament-group';

    const label = document.createElement('div');
    label.className = 'testament-label';
    label.textContent = testament.name;
    group.appendChild(label);

    testament.books.forEach((book, bi) => {
      const bookRow = document.createElement('div');
      bookRow.className = 'book-row';
      bookRow.dataset.ti = ti; bookRow.dataset.bi = bi;
      bookRow.innerHTML = `<span>${book.name}</span><span class="book-chevron">▶</span>`;

      const chList = document.createElement('div');
      chList.className = 'chapter-list';
      chList.id = `cl-${ti}-${bi}`;

      book.chapters.forEach((ch, ci) => {
        const btn = document.createElement('button');
        btn.className = 'ch-btn';
        btn.textContent = ch.number;
        btn.dataset.ti = ti; btn.dataset.bi = bi; btn.dataset.ci = ci;
        btn.setAttribute('aria-label', `${book.name} chapter ${ch.number}`);
        btn.addEventListener('click', e => {
          e.stopPropagation();
          navigateTo(ti, bi, ci);
          closeNav();
        });
        chList.appendChild(btn);
      });

      bookRow.addEventListener('click', () => {
        const isOpen = chList.classList.contains('open');
        document.querySelectorAll('.chapter-list.open').forEach(el => {
          el.classList.remove('open');
          el.previousElementSibling?.classList.remove('open');
        });
        chList.classList.toggle('open', !isOpen);
        bookRow.classList.toggle('open', !isOpen);
        if (!isOpen) setTimeout(() => bookRow.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
      });

      group.appendChild(bookRow);
      group.appendChild(chList);
    });

    sidebarInner.appendChild(group);
  });
}

function navigateTo(ti, bi, ci) {
  const testament = bible.testaments[ti];
  const book      = testament.books[bi];
  const chapter   = book.chapters[ci];

  currentFlat = flatIndex.findIndex(x => x.ti === ti && x.bi === bi && x.ci === ci);

  splash.style.display = 'none';
  chapterView.style.display = 'block';
  chapterView.classList.remove('fadein');
  void chapterView.offsetWidth;
  chapterView.classList.add('fadein');

  chapterHeading.textContent = `${testament.name}  ·  ${book.name}`;
  chapterTitle.textContent   = chapter.title
    ? `${chapter.number}. ${chapter.title}`
    : `Chapter ${chapter.number}`;
  chapterBody.innerHTML = (chapter.paragraphs || []).map(p => `<p>${p}</p>`).join('');

  const label = `${book.name} ${chapter.number}`;
  chapterRef.textContent = label;
  navLabel.innerHTML = `<strong>${label}</strong>`;

  updateSidebarActive(ti, bi, ci);
  updateNavButtons();
  reader.scrollTo({ top: 0, behavior: 'instant' });
}

function updateSidebarActive(ti, bi, ci) {
  document.querySelectorAll('.book-row.active').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.ch-btn.active').forEach(el => el.classList.remove('active'));

  document.querySelectorAll(`.book-row[data-ti="${ti}"][data-bi="${bi}"]`)
    .forEach(r => r.classList.add('active'));

  const btn = document.querySelector(`.ch-btn[data-ti="${ti}"][data-bi="${bi}"][data-ci="${ci}"]`);
  if (btn) {
    btn.classList.add('active');
    const chList = document.getElementById(`cl-${ti}-${bi}`);
    if (chList && !chList.classList.contains('open')) {
      chList.classList.add('open');
      chList.previousElementSibling?.classList.add('open');
    }
  }
}

function updateNavButtons() {
  btnPrev.disabled = currentFlat <= 0;
  btnNext.disabled = currentFlat >= flatIndex.length - 1;
}

btnPrev.addEventListener('click', () => {
  if (currentFlat > 0) {
    const { ti, bi, ci } = flatIndex[currentFlat - 1];
    navigateTo(ti, bi, ci);
  }
});

btnNext.addEventListener('click', () => {
  if (currentFlat < flatIndex.length - 1) {
    const { ti, bi, ci } = flatIndex[currentFlat + 1];
    navigateTo(ti, bi, ci);
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' && !btnNext.disabled) btnNext.click();
  if (e.key === 'ArrowLeft'  && !btnPrev.disabled) btnPrev.click();
});

function openNav()  { document.body.classList.remove('nav-closed'); document.body.classList.add('nav-open'); }
function closeNav() { document.body.classList.remove('nav-open');   document.body.classList.add('nav-closed'); }

menuToggle.addEventListener('click', () => {
  document.body.classList.contains('nav-closed') ? openNav() : closeNav();
});

/* ── About modal ─────────────────────────────────────────────────── */
const README_URL = 'https://raw.githubusercontent.com/firesidebible/Fireside-Bible/main/README.md';

const aboutBtn      = document.getElementById('about-btn');
const aboutBackdrop = document.getElementById('about-backdrop');
const aboutClose    = document.getElementById('about-close');
const aboutBody     = document.getElementById('about-body');
const aboutLoading  = document.getElementById('about-loading');

let readmeLoaded = false;

function mdToHtml(md) {
  // A lightweight markdown renderer covering common formatting
  let html = md
    // Escape HTML entities first
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    // Headers
    .replace(/^#### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // Horizontal rules
    .replace(/^---+$/gm, '<hr>')
    // Bold and italic
    .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/_(.+?)_/g, '<em>$1</em>')
    // Inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // Blockquotes
    .replace(/^&gt; (.+)$/gm, '<blockquote><p>$1</p></blockquote>')
    // Unordered lists
    .replace(/^\s*[-*] (.+)$/gm, '<li>$1</li>')
    // Ordered lists
    .replace(/^\s*\d+\. (.+)$/gm, '<li>$1</li>')
    // Links
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Wrap consecutive <li> in <ul>
  html = html.replace(/(<li>[\s\S]+?<\/li>)(?!\s*<li>)/g, (match) => {
    return '<ul>' + match + '</ul>';
  });
  // Clean up doubled ul wrapping
  html = html.replace(/<\/ul>\s*<ul>/g, '');

  // Paragraphs: lines not already wrapped in a block tag
  const blockTags = /^<(h[1-6]|ul|ol|li|blockquote|hr|pre)/;
  const lines = html.split('
');
  const out = [];
  let inPara = false;

  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) {
      if (inPara) { out.push('</p>'); inPara = false; }
      continue;
    }
    if (blockTags.test(trimmed)) {
      if (inPara) { out.push('</p>'); inPara = false; }
      out.push(trimmed);
    } else {
      if (!inPara) { out.push('<p>'); inPara = true; }
      out.push(trimmed + ' ');
    }
  }
  if (inPara) out.push('</p>');

  return out.join('\n');
}

async function loadReadme() {
  if (readmeLoaded) return;
  try {
    const res = await fetch(README_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const md = await res.text();
    aboutBody.innerHTML = mdToHtml(md);
    readmeLoaded = true;
  } catch (e) {
    aboutBody.innerHTML = `<p style="color:var(--accent)">Could not load README (${e.message}).</p>
      <p>You can view it at <a href="https://github.com/firesidebible/Fireside-Bible" target="_blank">github.com/firesidebible/Fireside-Bible</a>.</p>`;
  }
}

function openAbout() {
  aboutBackdrop.classList.add('open');
  loadReadme();
}
function closeAbout() {
  aboutBackdrop.classList.remove('open');
}

aboutBtn.addEventListener('click', openAbout);
aboutClose.addEventListener('click', closeAbout);
aboutBackdrop.addEventListener('click', e => {
  if (e.target === aboutBackdrop) closeAbout();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeAbout();
});
</script>
